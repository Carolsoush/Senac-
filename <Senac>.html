<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cadastro.com</title>
</head>

<body>
    <h1>Novo Cadastro</h1>

    <h2>Formulário de cadastro</h2>

    <hr>

    <form>
        <p>
            <label for="nome">Nome:</label>
            <input type="text" id="cadastro_nome" name="nome"><br><br>
        </p>
        <p>
            <label for="email">Email:</label>
            <input type="email" id="cadastro_email" name="email"><br><br>
        </p>
        <p>
            <label for="telefone">Telefone:</label>
            <input type="tel" id="cadastro_telefone" name="telefone"><br><br>
        </p>
        <p>
            <label for="senha">Senha:</label>
            <input type="password" id="cadastro_senha" name="senha"><br><br>
        </p>
        <p>
            <label for="repetir_senha">Repetir Senha:</label>
            <input type="password" id="repetir_senha" name="repetir_senha"><br><br>
        </p>
        <p>
            <button type="reset">Limpar</button>
            <button type="submit">Cadastrar</button>
        </p>
    </form>
